<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>wurl User Guide</title>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/docs.css" />
    <script>
      // Apply the theme passed from main (?theme=) before first paint so the
      // CSS custom properties in theme.css take effect with no flash.
      (function () {
        const t = new URLSearchParams(location.search).get("theme");
        if (t) document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body class="docs-window">
    <div id="docs-root"></div>
    <script type="module" src="scripts/docs-window.js"></script>
  </body>
</html>
