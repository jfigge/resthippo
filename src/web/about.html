<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>About Rest Hippo</title>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/theme.css" />
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-base);
        color: var(--color-text);
        font-family: var(--font-sans);
        user-select: none;
        -webkit-user-select: none;
      }
      #about {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 28px 40px 32px;
        text-align: center;
      }
      #logo {
        width: 160px;
        height: 160px;
        border-radius: 28px;
        margin-bottom: 12px;
      }
      #name-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      #app-name {
        font-size: 26px;
        font-weight: 700;
        color: var(--color-accent);
        letter-spacing: -0.02em;
        margin: 0;
      }
      /* Small circular (i) button that toggles the version panel. */
      #info-btn {
        flex: none;
        width: 18px;
        height: 18px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1.5px solid var(--color-accent);
        border-radius: 50%;
        background: transparent;
        color: var(--color-accent);
        font-family: Georgia, "Times New Roman", serif;
        font-style: italic;
        font-weight: 700;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        transition:
          background 120ms ease,
          color 120ms ease;
      }
      #info-btn:hover,
      #info-btn[aria-expanded="true"] {
        background: var(--color-accent);
        color: var(--color-crust);
      }
      #info-btn:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }
      #app-subtitle {
        font-size: 13px;
        color: var(--color-text);
        margin: 0;
      }
      #app-desc {
        font-size: 12px;
        color: var(--color-subtext);
        margin: 0 0 6px;
      }
      /* Version panel — a small popover under the name, toggled by the (i)
         button. Absolutely positioned so it floats over the text below without
         reflowing the fixed-size dialog. */
      #build-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        background: var(--color-surface-0);
        border-radius: var(--radius-md, 6px);
        padding: 10px 16px;
        min-width: 300px;
        font-size: 12px;
        font-family: var(--font-mono, monospace);
        white-space: nowrap;
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      }
      #build-info[hidden] {
        display: none;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }
      .label {
        color: var(--color-subtext);
      }
      .value {
        color: var(--color-text);
        font-weight: 500;
      }
      #credit {
        font-size: 11px;
        color: var(--color-overlay-0);
        margin: 6px 0 0;
      }
      /* Voluntary "tip jar" link — passive and unobtrusive; stays hidden until
         the main process supplies its label + destination (Feature 53). */
      #support {
        display: none; /* flipped to inline-flex once populated */
        align-items: center;
        gap: 5px;
        margin-top: 10px;
        padding: 3px 8px;
        font-size: 12px;
        color: var(--color-accent);
        text-decoration: none;
        border-radius: var(--radius-md, 6px);
      }
      #support:hover {
        text-decoration: underline;
      }
      #support:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }
      #support .heart {
        color: var(--color-accent);
      }
      #btn-ok {
        margin-top: 16px;
        padding: 7px 32px;
        background: var(--color-accent);
        color: var(--color-crust);
        border: none;
        border-radius: var(--radius-md, 6px);
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 120ms ease;
      }
      #btn-ok:hover {
        opacity: 0.85;
      }
      #btn-ok:active {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="about">
      <img id="logo" src="resthippo-logo.png" alt="Rest Hippo" />
      <div id="name-wrap">
        <h1 id="app-name">Rest Hippo</h1>
        <button
          id="info-btn"
          type="button"
          aria-controls="build-info"
          aria-expanded="false"
          aria-label="Version information"
        >
          i
        </button>
        <div id="build-info" hidden></div>
      </div>
      <p id="app-subtitle">REST API Client</p>
      <p id="app-desc">A desktop HTTP testing tool</p>
      <p id="credit">Created by Jason, coded by Claude</p>
      <a id="support" target="_blank" rel="noopener noreferrer">
        <span class="heart" aria-hidden="true">♥</span>
        <span id="support-label"></span>
      </a>
      <button id="btn-ok">OK</button>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);

        // Apply theme so CSS variables in theme.css take effect
        const theme = params.get("theme");
        if (theme) document.documentElement.dataset.theme = theme;

        // Populate build info rows
        const version = params.get("version");
        const branch = params.get("branch");
        const commit = params.get("commit");
        const buildInfo = document.getElementById("build-info");

        if (version) {
          buildInfo.innerHTML =
            row("Version", version) +
            row("Branch", branch || "—") +
            row("Commit", commit || "—");
        } else {
          buildInfo.innerHTML = row("Version", "dev build");
        }

        function row(label, value) {
          return (
            `<div class="info-row">` +
            `<span class="label">${label}</span>` +
            `<span class="value">${esc(value)}</span>` +
            `</div>`
          );
        }

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        // Voluntary donation link (Feature 53). The main process supplies the
        // localized label and the https destination; the about window's
        // window-open handler routes the click to the system browser. Render it
        // only when both are present (e.g. opened standalone in dev → hidden).
        const support = document.getElementById("support");
        const supportLabel = params.get("support");
        const donateUrl = params.get("donate");
        if (supportLabel && donateUrl) {
          document.getElementById("support-label").textContent = supportLabel;
          support.setAttribute("href", donateUrl);
          support.style.display = "inline-flex";
        }

        // (i) button toggles the version panel (replaces the old hover tooltip).
        const infoBtn = document.getElementById("info-btn");
        function setPanel(open) {
          buildInfo.hidden = !open;
          infoBtn.setAttribute("aria-expanded", String(open));
        }
        infoBtn.addEventListener("click", () => setPanel(buildInfo.hidden));
        // A click anywhere outside the panel or the button dismisses it.
        document.addEventListener("click", (e) => {
          if (
            !buildInfo.hidden &&
            !infoBtn.contains(e.target) &&
            !buildInfo.contains(e.target)
          ) {
            setPanel(false);
          }
        });

        document
          .getElementById("btn-ok")
          .addEventListener("click", () => window.close());
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            // Escape closes the version panel first, then the window.
            if (!buildInfo.hidden) return setPanel(false);
            return window.close();
          }
          // Enter acts as OK (closes) — but not when an interactive control
          // (donation link, info button) is focused; let it do its own thing.
          if (
            e.key === "Enter" &&
            e.target.id !== "support" &&
            e.target.id !== "info-btn"
          )
            window.close();
        });
      })();
    </script>
  </body>
</html>
