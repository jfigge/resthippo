<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>About Rest Hippo</title>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/theme.css" />
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-base);
        color: var(--color-text);
        font-family: var(--font-sans);
        user-select: none;
        -webkit-user-select: none;
      }
      #about {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 28px 40px 32px;
        text-align: center;
      }
      #logo {
        width: 160px;
        height: 160px;
        border-radius: 28px;
        margin-bottom: 12px;
      }
      #app-name {
        font-size: 26px;
        font-weight: 700;
        color: var(--color-accent);
        letter-spacing: -0.02em;
        margin: 0;
      }
      #app-subtitle {
        font-size: 13px;
        color: var(--color-text);
        margin: 0;
      }
      #app-desc {
        font-size: 12px;
        color: var(--color-subtext);
        margin: 0 0 6px;
      }
      #build-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        background: var(--color-surface-0);
        border-radius: var(--radius-md, 6px);
        padding: 10px 16px;
        min-width: 230px;
        font-size: 12px;
        font-family: var(--font-mono, monospace);
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }
      .label {
        color: var(--color-subtext);
      }
      .value {
        color: var(--color-text);
        font-weight: 500;
      }
      #credit {
        font-size: 11px;
        color: var(--color-overlay-0);
        margin: 6px 0 0;
      }
      #btn-ok {
        margin-top: 16px;
        padding: 7px 32px;
        background: var(--color-accent);
        color: var(--color-crust);
        border: none;
        border-radius: var(--radius-md, 6px);
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 120ms ease;
      }
      #btn-ok:hover {
        opacity: 0.85;
      }
      #btn-ok:active {
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="about">
      <img id="logo" src="resthippo-logo.png" alt="Rest Hippo" />
      <h1 id="app-name">Rest Hippo</h1>
      <p id="app-subtitle">REST API Client</p>
      <p id="app-desc">A desktop HTTP testing tool</p>
      <div id="build-info"></div>
      <p id="credit">Created by Jason, coded by Claude</p>
      <button id="btn-ok">OK</button>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);

        // Apply theme so CSS variables in theme.css take effect
        const theme = params.get("theme");
        if (theme) document.documentElement.dataset.theme = theme;

        // Populate build info rows
        const version = params.get("version");
        const branch = params.get("branch");
        const commit = params.get("commit");
        const buildInfo = document.getElementById("build-info");

        if (version) {
          buildInfo.innerHTML =
            row("Version", version) +
            row("Branch", branch || "—") +
            row("Commit", commit || "—");
        } else {
          buildInfo.innerHTML = row("Version", "dev build");
        }

        function row(label, value) {
          return (
            `<div class="info-row">` +
            `<span class="label">${label}</span>` +
            `<span class="value">${esc(value)}</span>` +
            `</div>`
          );
        }

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        document
          .getElementById("btn-ok")
          .addEventListener("click", () => window.close());
        document.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === "Escape") window.close();
        });
      })();
    </script>
  </body>
</html>
