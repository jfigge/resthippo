<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="RestHippo macOS app icon">
  <title>RestHippo macOS icon</title>
  <!--
    macOS app-icon grid (Big Sur+): the rounded-rectangle body occupies a
    centered 826×826 region of a 1024×1024 canvas, leaving 99px of transparent
    margin on every side. (This is the Big Sur safe area — 824×824 / 100px —
    nudged 1px larger on each side.) The original 512-unit artwork is scaled by
    826/512 (=1.61328125) and offset by 99px so it lands exactly in that region;
    its corner radius (114 → ~184) matches Apple's spec (185.4).
  -->
  <g transform="translate(99,99) scale(1.61328125)">
    <rect x="0" y="0" width="512" height="512" rx="114" fill="#6C5CE7"/>
    <circle cx="170" cy="146" r="40" fill="#FFFFFF"/>
    <circle cx="342" cy="146" r="40" fill="#FFFFFF"/>
    <rect x="144" y="140" width="224" height="190" rx="74" fill="#FFFFFF"/>
    <rect x="118" y="260" width="276" height="150" rx="74" fill="#FFFFFF"/>
    <circle cx="201" cy="198" r="17" fill="#6C5CE7"/>
    <circle cx="311" cy="198" r="17" fill="#6C5CE7"/>
    <ellipse cx="210" cy="330" rx="14" ry="20" fill="#6C5CE7"/>
    <ellipse cx="302" cy="330" rx="14" ry="20" fill="#6C5CE7"/>
  </g>
</svg>
