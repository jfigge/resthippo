<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: only load scripts/styles from the same origin.
      Adjust connect-src for the domains you need when making real API calls.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        connect-src *;
        img-src     'self' data: blob:;
      "
    />
    <title>Rest Hippo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Design tokens, reset, layout, panel system, components -->
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/panels.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <!-- WebSocket frame log + composer (Feature 32) -->
    <link rel="stylesheet" href="styles/ws-console.css" />
    <!-- Syntax highlighting (Prism.js token colours — maps to app design tokens) -->
    <link rel="stylesheet" href="styles/prism.css" />
  </head>
  <body>
    <div id="app">
      <!-- ── App header ────────────────────────────────────────────────── -->
      <header id="app-header" aria-label="Application header">
        <!-- Brand mark, top-left corner (visible only when app-header is
             shown — i.e. "Remove headers" is off). Clicking opens the About
             dialog. -->
        <button
          class="app-header-icon-btn"
          id="btn-about"
          type="button"
          aria-label="About Rest Hippo"
          title="About Rest Hippo"
        >
          <img
            class="app-header-icon"
            src="resthippo-icon.svg"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
        </button>
        <span class="app-logo" aria-label="Rest Hippo">Rest Hippo</span>
        <span class="app-subtitle">REST API Client</span>

        <!-- ── Header icon panel (right-aligned) ───────────────────────── -->
        <div
          class="header-icon-panel"
          role="toolbar"
          aria-label="Application actions"
        >
          <button
            class="icon-btn header-icon-btn"
            id="btn-settings"
            title="Settings"
            aria-label="Open settings"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                       a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                       A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                       l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                       A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                       l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                       a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                       l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                       a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Main 3-section layout ─────────────────────────────────────── -->
      <!--
        CSS grid areas (see layout.css):
          landscape  → nav | spl-1 | request | spl-2 | response   (3 columns)
          in-between → nav + request top / response full-width bottom
          portrait   → nav / request / response  (3 rows)

        The two splitter divs are real grid children so they occupy a grid cell
        in each breakpoint's template-areas declaration.
      -->
      <main id="app-main" aria-label="Main workspace">
        <!-- Section 1 — Navigation / Collections tree ───────────────── -->
        <div
          id="panel-nav"
          class="panel"
          data-flow="column"
          role="region"
          aria-label="Collections"
        >
          <!--
            The panel-header shows the "Collection" title (hidden in Remove
            Headers mode like every other .panel-header). Its .panel-actions is
            only the initial DOM home for #btn-collection — kept hidden, since
            placeRemoveHeaderControls relocates that button into the tree-toolbar's
            trailing cluster (next to the environment selector) at startup.
          -->
          <div class="panel-header">
            <span class="panel-title">Collection</span>
            <div class="panel-actions">
              <button
                class="coll-picker-trigger"
                id="btn-collection"
                title="Collections"
                aria-label="Open collections"
                aria-haspopup="dialog"
              ></button>
            </div>
          </div>
          <div class="panel-body" id="tree-view-root"></div>

          <!-- Settings bar — only visible when app-header is hidden (Remove headers) -->
          <div
            id="nav-settings-bar"
            class="nav-settings-bar"
            aria-hidden="true"
          >
            <button
              class="coll-picker-trigger"
              id="btn-collection-nav"
              title="Collections"
              aria-label="Open collections"
              aria-haspopup="dialog"
            ></button>
            <button
              class="env-picker-trigger"
              id="btn-env-picker-nav"
              title="Environment"
              aria-label="Select environment"
              aria-haspopup="menu"
            ></button>
            <button
              class="icon-btn header-icon-btn"
              id="btn-settings-nav"
              title="Settings"
              aria-label="Open settings"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                         a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                         A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                         l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                         A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                         l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                         a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                         l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                         a1.65 1.65 0 0 0-1.51 1z"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Splitter 1 (between nav and request) ─────────────────────── -->
        <div
          id="splitter-1"
          class="splitter splitter--h"
          role="separator"
          aria-orientation="vertical"
          title="Drag to resize"
        ></div>

        <!-- Section 2 — Request editor ──────────────────────────────── -->
        <div
          id="panel-request"
          class="panel"
          data-flow="column"
          role="region"
          aria-label="Request editor"
        >
          <div class="panel-header">
            <span class="panel-title">Request</span>
          </div>
          <div class="panel-body" id="request-editor-root"></div>
        </div>

        <!-- Splitter 2 (between request and response) ────────────────── -->
        <div
          id="splitter-2"
          class="splitter splitter--h"
          role="separator"
          aria-orientation="vertical"
          title="Drag to resize"
        ></div>

        <!-- Section 3 — Response viewer ─────────────────────────────── -->
        <div
          id="panel-response"
          class="panel"
          data-flow="column"
          role="region"
          aria-label="Response viewer"
        >
          <div class="panel-header">
            <span class="panel-title">Response</span>
          </div>
          <div class="panel-body" id="response-viewer-root"></div>
        </div>
      </main>
    </div>

    <!-- ES-module entry point — imports all components -->
    <script type="module" src="scripts/app.js"></script>
  </body>
</html>
