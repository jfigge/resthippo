name: Deploy Website

# Builds the marketing/download site and publishes it to GitHub Pages
# (resthippo.com). Runs on every push to main and manually. Downloads link to
# GitHub Releases; versions.json and the hosted user guide are generated here so
# the site always tracks the repo.
#
# NOTE: there is deliberately NO `release: published` trigger. GitHub never
# starts a workflow run from an event created by the default GITHUB_TOKEN, and
# our Releases are published by the Release workflow using that token — so a
# `release: published` trigger here would silently never fire. Instead, the
# Release workflow (release.yml) explicitly dispatches this one via
# `workflow_dispatch` after publishing, which DOES fire with the built-in token.
#
# NOTE: this deliberately has NO `paths:` filter. A path-filtered push trigger
# does not reliably fire on a squash-merge commit (the merge that lands a PR can
# skip the filter even when it changes website/** — that stranded the feature
# page behind a 404 once). The build is ~20s, so unconditionally deploying every
# push to main is cheaper than the risk of a silently stale site.
#
# Requires Pages → Source = "GitHub Actions" (the build job's configure-pages
# step enables it on first run). Custom domain comes from website/CNAME.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# GITHUB_TOKEN scopes Pages needs; id-token lets deploy-pages attest the artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let queued runs wait their turn.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - name: Generate versions.json from GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-versions.mjs --repo "${{ github.repository }}" --out website/versions.json

      - name: Build hosted user guide (Markdown → HTML)
        run: |
          npm install --no-save --no-audit --no-fund --prefix /tmp/docsdeps marked@18
          MARKED_DIR=/tmp/docsdeps/node_modules node scripts/build-docs.mjs

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: website

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
