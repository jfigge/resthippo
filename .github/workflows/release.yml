name: Release

# Trigger a full release cycle by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# `workflow_dispatch` also lets you run the build manually from the Actions tab
# to smoke-test packaging — that path builds installers but does NOT publish a
# GitHub Release (only tag pushes do).
#
# Code signing + notarization (Feature 31) is wired into the build steps below
# and driven entirely by repository secrets — when a secret is empty the build
# still succeeds, just unsigned, so this workflow works before the certs are
# configured. Add these secrets to enable signing (Settings → Secrets and
# variables → Actions):
#
#   macOS signing       CSC_LINK                     base64 of the Developer ID
#                                                    Application .p12
#                        CSC_KEY_PASSWORD            its export password
#   macOS notarization   APPLE_ID                     Apple ID email
#                        APPLE_APP_SPECIFIC_PASSWORD  app-specific password
#                        APPLE_TEAM_ID                10-char Team ID
#   Windows signing      Authenticode via SignPath Foundation (free OSS code
#   (SignPath)           signing). The publisher shows as "SignPath Foundation",
#                        not Jason Figge — accepted tradeoff for a free, trusted
#                        signature on an Apache-2.0 project. Signing is SKIPPED
#                        (the unsigned build still ships) until the org-id VARIABLE
#                        is set, so this workflow works before SignPath is wired.
#                        Configure (Settings → Secrets and variables → Actions):
#                          secrets.SIGNPATH_API_TOKEN          CI user API token
#                          vars.SIGNPATH_ORGANIZATION_ID       enables signing when set
#                          vars.SIGNPATH_PROJECT_SLUG          SignPath project slug
#                          vars.SIGNPATH_SIGNING_POLICY_SLUG   e.g. release-signing
#                          vars.SIGNPATH_ARTIFACT_CONFIG_SLUG  artifact configuration slug
#                        Also install the SignPath GitHub App on the repo. Each
#                        release waits for manual approval in the SignPath console.
#
# The installer's internal version comes from src/package.json ("version"), so
# bump that to match the tag before tagging.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read # build job only reads; the release job elevates to write below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  # ── Build real installers on each native runner ─────────────────────────────
  build:
    name: Build installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read # the SignPath action downloads the uploaded artifact by id
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: dist-mac
          - os: ubuntu-latest
            target: dist-linux
          - os: windows-latest
            target: dist-win
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # full history so `git describe --tags` resolves VERSION

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      # Windows runners lack make/rsync/bash; MSYS2 provides them so the same
      # `make dist-win` recipe runs unchanged (see ci.yml for the rationale).
      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: UCRT64
          install: make rsync
          path-type: inherit

      - name: Build installers (Windows)
        if: runner.os == 'Windows'
        shell: "msys2 {0}"
        # Built UNSIGNED here; Authenticode signing is applied out-of-band by
        # SignPath in the steps below (see the file header). electron-builder's
        # signtoolOptions in package.json are inert without a local cert.
        run: make ${{ matrix.target }}

      # ── Windows Authenticode via SignPath Foundation ─────────────────────────
      # All three steps are gated on the SignPath org-id variable being set, so
      # until SignPath is configured they are skipped and the unsigned build above
      # ships as-is (mirrors the empty-secret graceful-skip used for macOS).
      - name: Upload unsigned Windows exes for signing
        id: unsigned-win
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: unsigned-win
          path: build/src/dist/*.exe
          if-no-files-found: error
          retention-days: 1 # intermediate hand-off only; never published

      - name: Sign Windows exes with SignPath
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ steps.unsigned-win.outputs.artifact-id }}
          wait-for-completion: true
          # Signed exes are extracted back over the unsigned ones in dist/.
          output-artifact-directory: build/src/dist

      # SignPath rewrote the .exe bytes AFTER electron-builder hashed them into
      # latest.yml, so recompute the sha512/size and drop the stale blockmaps or
      # electron-updater rejects every signed release on a checksum mismatch.
      - name: Refresh auto-update metadata after signing
        if: runner.os == 'Windows' && vars.SIGNPATH_ORGANIZATION_ID != ''
        run: node scripts/resign-update-metadata.mjs build/src/dist

      - name: Build installers (macOS / Linux)
        if: runner.os != 'Windows'
        # Developer ID signing + notarization. Auto-discovery is enabled only
        # when a cert is present; otherwise it is forced off so the macOS build
        # cleanly skips signing instead of hunting for an identity. Linux
        # ignores all of these. Empty notarization secrets ⇒ notarization is
        # skipped (no failure).
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: make ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: installers-${{ matrix.os }}
          path: |
            build/src/dist/*.dmg
            build/src/dist/*.zip
            build/src/dist/*.AppImage
            build/src/dist/*.deb
            build/src/dist/*.exe
            build/src/dist/latest*.yml
            build/src/dist/*.blockmap
          if-no-files-found: error
          # These artifacts are only a hand-off to the `release` job within the
          # same run (which attaches them to the GitHub Release — Release assets
          # don't count against Actions storage). Expire them fast so manual
          # workflow_dispatch smoke-test builds don't accumulate. The minimum is
          # 1 day; same-run downloads work regardless of retention.
          retention-days: 1

  # ── Publish a GitHub Release with all platforms' installers attached ────────
  # Only runs for tag pushes; manual dispatch stops after the build job above.
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          path: artifacts
          # Only the per-OS final installers — excludes the intermediate
          # `unsigned-win` artifact so unsigned exes never reach the Release.
          pattern: installers-*

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Refresh the website now that the Release is published ───────────────────
  # deploy-site.yml's `release: published` trigger does NOT fire from here:
  # GitHub never starts a workflow run from an event created by the default
  # GITHUB_TOKEN, and the Release above is published with that token. The push of
  # the version-bump commit to main *does* run deploy-site, but ~8 min earlier —
  # before this Release exists — so it captures the OLD version. We close the gap
  # by explicitly dispatching deploy-site after publishing; workflow_dispatch is
  # the sanctioned exception to the GITHUB_TOKEN no-recursion rule, so it fires
  # reliably with the built-in token (no PAT needed). Gated on `release`, so a
  # manual workflow_dispatch smoke build (where `release` is skipped) won't run it.
  refresh-site:
    name: Refresh website
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: write # POST .../actions/workflows/{id}/dispatches
    steps:
      - name: Trigger Deploy Website
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-site.yml --ref main --repo "${{ github.repository }}"

  # ── Announce the release on X (Twitter) ────────────────────────────────────
  # Posts a single tweet once the Release is published. Authenticated with
  # OAuth 1.0a user-context credentials from an X developer app, supplied as
  # repository secrets. Like the signing secrets above, EMPTY secrets are not an
  # error: scripts/post-release-tweet.mjs detects missing credentials and exits
  # cleanly without posting, so this job stays a no-op until the four secrets
  # are configured (Settings → Secrets and variables → Actions):
  #
  #   X_API_KEY         OAuth 1.0a consumer (API) key
  #   X_API_SECRET      OAuth 1.0a consumer (API) secret
  #   X_ACCESS_TOKEN    access token for the posting account (app = Read + Write)
  #   X_ACCESS_SECRET   access token secret
  #
  # Gated on tag pushes, so a manual workflow_dispatch smoke build won't tweet.
  announce:
    name: Announce on X
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Post release tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/post-release-tweet.mjs
