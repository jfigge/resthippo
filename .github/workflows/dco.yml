name: DCO

# Enforce the Developer Certificate of Origin on every pull request: each
# non-merge commit must carry a `Signed-off-by:` trailer matching its author.
# See CONTRIBUTING.md and the DCO file for what contributors need to do.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: dco-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify Developer Certificate of Origin sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Checking ${BASE_SHA}..${HEAD_SHA} for DCO sign-off"
          fail=0
          # Every non-merge commit unique to this PR must be signed off by its
          # author. Merge commits are exempt (they carry no authored changes).
          for sha in $(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}"); do
            name=$(git show -s --format='%an' "$sha")
            email=$(git show -s --format='%ae' "$sha")
            subject=$(git show -s --format='%s' "$sha")
            expected="Signed-off-by: ${name} <${email}>"
            # Match case-insensitively (email casing is not significant).
            if git show -s --format='%B' "$sha" | grep -qiF "$expected"; then
              echo "  ok   ${sha:0:8}  ${subject}"
            else
              echo "  FAIL ${sha:0:8}  ${subject}"
              echo "         missing: ${expected}"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more commits are missing a DCO sign-off."
            echo "Sign new commits with:  git commit -s"
            echo "Fix an existing branch: git rebase --signoff ${BASE_SHA} && git push --force-with-lease"
            echo "See CONTRIBUTING.md and the DCO file for details."
            exit 1
          fi
          echo ""
          echo "All commits carry a valid Signed-off-by line."
